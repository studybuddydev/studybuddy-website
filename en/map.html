<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Map — StudyBuddy</title>
  <meta name="description" content="Explore universities around the world where StudyBuddy students are studying.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=League+Spartan:wght@700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <style>
    /* ── Reset & base ─────────────────────────────────── */
    :root {
      --color-primary: #00A1A1;
      --color-primary-light: #81e3e3;
      --color-primary-lighter: #f8fdff;
      --color-primary-dark: #006969;
      --color-secondary: #FF8500;
      --color-secondary-light: #ffa200;
      --color-text: #191C1C;
      --color-background: #F5F5F5;
      --color-accent: #FF4081;
      --color-tertiary: #086767;
      --color-surface: #F5F5F5;
      --color-inverse-surface: #2D3131;
      --color-on-inverse-surface: #EFF1F1;
      --color-outline: #6F7979;
      --font-primary: 'Poppins', sans-serif;
      --font-secondary: 'League Spartan', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-primary);
      background: #1a1a2e;
      color: var(--color-on-inverse-surface);
      overflow: hidden;
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────────── */
    .map-header {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: rgba(45, 49, 49, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3rem;
      padding: 0.6rem 1.8rem;
      max-width: 90vw;
    }

    .map-header .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }

    .map-header .logo img {
      width: 28px;
      height: 28px;
    }

    .map-header .logo span {
      font-family: var(--font-secondary);
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
    }

    .map-header .divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.15);
    }

    .map-header .page-title {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.03em;
    }

    .map-header .back-link {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--color-primary-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .map-header .back-link:hover {
      color: var(--color-secondary);
    }

    /* ── Map container ────────────────────────────────── */
    #map {
      width: 100%;
      height: 100vh;
    }

    /* ── Leaflet overrides ────────────────────────────── */
    .leaflet-container {
      background: #1a1a2e;
      font-family: var(--font-primary);
    }

    .leaflet-control-attribution {
      background: rgba(26, 26, 46, 0.7) !important;
      color: rgba(255,255,255,0.35) !important;
      font-size: 0.65rem !important;
    }

    .leaflet-control-attribution a {
      color: rgba(255,255,255,0.45) !important;
    }

    .leaflet-control-zoom a {
      background: rgba(45, 49, 49, 0.9) !important;
      color: #fff !important;
      border-color: rgba(255,255,255,0.1) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--color-primary-dark) !important;
    }

    /* ── Custom tooltip ───────────────────────────────── */
    .uni-tooltip {
      background: rgba(45, 49, 49, 0.95) !important;
      border: 1px solid var(--color-primary) !important;
      border-radius: 0.6rem !important;
      padding: 0.5rem 0.8rem !important;
      font-family: var(--font-primary) !important;
      font-size: 0.8rem !important;
      color: #fff !important;
      box-shadow: 0 4px 20px rgba(0, 161, 161, 0.2) !important;
      white-space: nowrap;
    }

    .uni-tooltip .uni-name {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.15rem;
    }

    .uni-tooltip .uni-meta {
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.65);
    }

    .uni-tooltip .uni-students {
      color: var(--color-primary-light);
      font-weight: 600;
    }

    .uni-tooltip::before {
      border-top-color: var(--color-primary) !important;
    }

    .leaflet-tooltip-top::before {
      border-top-color: var(--color-primary) !important;
    }

    .leaflet-tooltip-bottom::before {
      border-bottom-color: var(--color-primary) !important;
    }

    /* ── Legend ────────────────────────────────────────── */
    .map-legend {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 1000;
      background: rgba(45, 49, 49, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.8rem;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .legend-dot {
      border-radius: 50%;
      background: var(--color-primary);
      opacity: 0.8;
      flex-shrink: 0;
    }

    .legend-dot.small  { width:  6px; height:  6px; }
    .legend-dot.medium { width: 12px; height: 12px; }
    .legend-dot.large  { width: 20px; height: 20px; }

    .legend-label {
      font-size: 0.7rem;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      line-height: 1.3;
    }

    /* ── Loading state ────────────────────────────────── */
    .map-loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: opacity 0.6s ease;
    }

    .map-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .map-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── View toggle ──────────────────────────────────── */
    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.07);
      border-radius: 2rem;
      padding: 2px;
      gap: 2px;
    }

    .toggle-btn {
      background: transparent;
      border: none;
      border-radius: 2rem;
      padding: 0.25rem 0.8rem;
      font-family: var(--font-primary);
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .toggle-btn.active {
      background: var(--color-primary);
      color: #fff;
    }

    .toggle-btn:not(.active):hover {
      color: rgba(255,255,255,0.85);
    }

    /* ── Country gradient legend ──────────────────────── */
    .legend-gradient {
      width: 56px;
      height: 7px;
      border-radius: 4px;
      background: linear-gradient(to right, rgba(0,161,161,0.15), rgba(0,161,161,0.9));
    }
    .legend-gradient.heat {
      background: linear-gradient(to right, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
      opacity: 0.85;
    }
    /* ── Stats bar ────────────────────────────────────── */
    .map-stats {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      background: rgba(45, 49, 49, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.8rem;
      padding: 0.6rem 1rem;
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-secondary);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-primary-light);
    }

    .stat-label {
      font-size: 0.6rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 600px) {
      .map-header {
        padding: 0.5rem 1rem;
        gap: 0.8rem;
      }

      .map-header .page-title { display: none; }
      .map-header .divider    { display: none; }

      .map-legend { bottom: 0.8rem; left: 0.8rem; padding: 0.5rem 0.8rem; }
      .map-stats  { bottom: 0.8rem; right: 0.8rem; padding: 0.5rem 0.8rem; gap: 0.8rem; }

      .stat-value { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div class="map-loading" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Slim header -->
  <header class="map-header">
    <a href="/en/" class="logo">
      <img src="/imgs/logo.png" alt="StudyBuddy" width="28" height="28">
      <span>StudyBuddy</span>
    </a>
    <div class="divider"></div>
    <span class="page-title">University Map</span>
    <div class="view-toggle">
      <button class="toggle-btn active" id="btn-dots" onclick="setMode('dots')">Dots</button>
      <button class="toggle-btn" id="btn-heatmap" onclick="setMode('heatmap')">Heatmap</button>
      <button class="toggle-btn" id="btn-countries" onclick="setMode('countries')">Countries</button>
    </div>
    <a href="/en/" class="back-link">&larr; Back</a>
  </header>

  <!-- Map -->
  <div id="map"></div>

  <!-- Legend -->
  <div class="map-legend">
    <div id="dots-legend" style="display:flex;align-items:center;gap:0.8rem;">
      <div class="legend-dot small"></div>
      <div class="legend-dot medium"></div>
      <div class="legend-dot large"></div>
      <div class="legend-label">Dot size = students<br>on StudyBuddy</div>
    </div>
    <div id="countries-legend" style="display:none;align-items:center;gap:0.6rem;">
      <div class="legend-gradient"></div>
      <div class="legend-label">Fewer &rarr; More students</div>
    </div>
    <div id="heatmap-legend" style="display:none;align-items:center;gap:0.6rem;">
      <div class="legend-gradient heat"></div>
      <div class="legend-label">Low &rarr; High density</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="map-stats">
    <div class="stat-item">
      <div class="stat-value" id="stat-unis">—</div>
      <div class="stat-label">Universities</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-countries">—</div>
      <div class="stat-label">Countries</div>
    </div>
    <!-- <div class="stat-item">
      <div class="stat-value" id="stat-students">—</div>
      <div class="stat-label">Students</div>
    </div> -->
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <!-- Leaflet.heat -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <script>
    // ── Configuration ──────────────────────────────────
    // TODO: Replace this URL with your API endpoint for live data
    const DATA_URL = 'https://api.beta.studybuddy.it/data/university-statistics';

    const TILE_URL = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

    // ── Country centroids by alpha-2 code ──────────────
    // Used to place universities that have no coordinates.
    // A random offset (±2°) is added so dots don't stack on top of each other.
    const COUNTRY_CENTROIDS = {
      AF:[33,65],AL:[41,20],DZ:[28,3],AD:[42.5,1.5],AO:[-12.5,18.5],AG:[17.05,-61.8],
      AR:[-34,-64],AM:[40,45],AU:[-25,135],AT:[47.3,13.3],AZ:[40.5,47.5],BS:[24.25,-76],
      BH:[26,50.5],BD:[24,90],BB:[13.2,-59.5],BY:[53,28],BE:[50.8,4],BZ:[17.2,-88.7],
      BJ:[9.5,2.3],BT:[27.5,90.5],BO:[-17,-65],BA:[44,18],BW:[-22,24],BR:[-10,-55],
      BN:[4.5,114.7],BG:[43,25],BF:[13,-2],BI:[-3.5,30],KH:[13,105],CM:[6,12],
      CA:[60,-96],CV:[16,-24],CF:[7,21],TD:[15,19],CL:[-30,-71],CN:[35,105],
      CO:[4,-72],KM:[-12.2,44.3],CG:[-1,15],CD:[-3,23],CR:[10,-84],CI:[8,-5.5],
      HR:[45.2,15.5],CU:[22,-80],CY:[35,33],CZ:[49.75,15.5],DK:[56,10],DJ:[11.5,43],
      DM:[15.4,-61.4],DO:[19,-70.7],EC:[-2,-77.5],EG:[27,30],SV:[13.8,-88.9],
      GQ:[2,10],ER:[15,39],EE:[59,26],SZ:[-26.5,31.5],ET:[8,38],FJ:[-18,175],
      FI:[64,26],FR:[46,2],GA:[-1,11.7],GM:[13.5,-15.5],GE:[42,43.5],DE:[51,9],
      GH:[8,-2],GR:[39,22],GD:[12.1,-61.7],GT:[15.5,-90.3],GN:[11,-10],GW:[12,-15],
      GY:[5,-59],HT:[19,-72.4],HN:[15,-87],HU:[47,20],IS:[65,-18],IN:[22,80],
      ID:[-5,120],IR:[32,53],IQ:[33,44],IE:[53,-8],IL:[31.5,34.8],IT:[42,12.5],
      JM:[18.1,-77.3],JP:[36,138],JO:[31,36],KZ:[48,68],KE:[-1,38],KI:[1.4,173],
      KP:[40,127],KR:[37,128],KW:[29.5,47.8],KG:[41,75],LA:[18,105],LV:[57,25],
      LB:[33.8,35.8],LS:[-29.5,28.5],LR:[6.5,-9.5],LY:[25,17],LI:[47.2,9.5],
      LT:[56,24],LU:[49.8,6.2],MG:[-20,47],MW:[-13.5,34],MY:[2.5,112.5],MV:[3.2,73],
      ML:[17,-4],MT:[35.9,14.4],MH:[9,168],MR:[20,-12],MU:[-20.3,57.6],MX:[23,-102],
      FM:[6.9,158.2],MD:[47,29],MC:[43.7,7.4],MN:[46,105],ME:[42.5,19.3],MA:[32,-5],
      MZ:[-18.3,35],MM:[22,98],NA:[-22,17],NR:[-0.5,166.9],NP:[28,84],NL:[52.5,5.8],
      NZ:[-42,174],NI:[13,-85],NE:[16,8],NG:[10,8],MK:[41.5,22],NO:[62,10],
      OM:[21,57],PK:[30,70],PW:[7.5,134.6],PA:[9,-80],PG:[-6,147],PY:[-23,-58],
      PE:[-10,-76],PH:[13,122],PL:[52,20],PT:[39.5,-8],QA:[25.5,51.3],RO:[46,25],
      RU:[60,100],RW:[-2,30],KN:[17.3,-62.7],LC:[13.9,-61],VC:[13.3,-61.2],
      WS:[-13.6,-172.3],SM:[43.9,12.4],ST:[1,7],SA:[25,45],SN:[14,-14],RS:[44,21],
      SC:[-4.7,55.5],SL:[8.5,-11.8],SG:[1.4,103.8],SK:[48.7,19.7],SI:[46.1,14.8],
      SB:[-8,159],SO:[6,48],ZA:[-29,24],SS:[8,32],ES:[40,-4],LK:[7,81],SD:[16,30],
      SR:[4,-56],SE:[62,15],CH:[47,8],SY:[35,38],TW:[23.5,121],TJ:[39,71],
      TZ:[-6,35],TH:[15,100],TL:[-9,126],TG:[8,1.2],TO:[-20,-175],TT:[10.4,-61.3],
      TN:[34,9],TR:[39,35],TM:[40,60],TV:[-8,178],UG:[1,32],UA:[49,32],
      AE:[24,54],GB:[54,-2],US:[38,-97],UY:[-33,-56],UZ:[41,64],VU:[-16,167],
      VE:[8,-66],VN:[16,108],YE:[15.5,48],ZM:[-15,30],ZW:[-20,30],
      PS:[31.9,35.2],XK:[42.6,21],CW:[12.2,-69],SX:[18,63],PR:[18.2,-66.5],
      HK:[22.3,114.2],MO:[22.2,113.5],RE:[-21.1,55.5],GP:[16.3,-61.6],
      MQ:[14.6,-61],GF:[4,-53],NC:[-22,166.5],PF:[-17.7,-149.4]
    };

    // ── Pre-computed coordinates file ──────────────────
    // Generated by scripts/geocode_universities.py using Nominatim.
    // Maps university name → {lat, lng}. Loaded once, merged with API data.
    const COORDS_URL = '/public/university_coords.json';

    // Coordinate lookup (populated after fetch)
    let UNIVERSITY_COORDS = {};

    // ── Global state ───────────────────────────────────
    let universitiesData = null;
    let geoJsonCache = {}; // keyed by '110m' | '50m'
    let geoJsonData = null;
    let currentMode = 'dots';
    let activeResolution = null;

    const GEO_SOURCES = {
      '110m': 'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector/geojson/ne_110m_admin_0_countries.geojson',
      '50m':  'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector/geojson/ne_50m_admin_0_countries.geojson'
    };

    function resolutionForZoom(z) { return z >= 5 ? '50m' : '110m'; }

    // ── Resolve coordinates for a university ───────────
    // Priority: 1) lat/lng in API data  2) pre-computed coords file  3) country centroid + jitter
    function resolveCoords(uni) {
      // 1. Coordinates directly in the data
      if (uni.lat != null && (uni.lng != null || uni.lon != null)) {
        return [uni.lat, uni.lng ?? uni.lon];
      }
      // 2. Pre-computed geocoded coordinates
      const precomputed = UNIVERSITY_COORDS[uni.name];
      if (precomputed) {
        return [precomputed.lat, precomputed.lng];
      }
      // 3. Fallback: country centroid with random jitter
      const centroid = COUNTRY_CENTROIDS[uni.alpha_two_code];
      if (!centroid) return null;
      const jitterLat = (Math.random() - 0.5) * 4; // ±2°
      const jitterLng = (Math.random() - 0.5) * 4;
      return [centroid[0] + jitterLat, centroid[1] + jitterLng];
    }

    // ── Dot sizing ─────────────────────────────────────
    // sqrt scale keeps 1–700 range visually balanced
    // students=0  → radius = 2     (minimum visible)
    // students=1  → radius ≈ 2.4
    // students=100 → radius ≈ 6
    // students=700 → radius ≈ 12.6 (prominent, not huge)
    function dotRadius(students) {
      if (!students || students <= 0) return 2;
      return 2 + Math.sqrt(students) * 0.4;
    }

    // ── Initialize map ─────────────────────────────────
    const canvasRenderer = L.canvas({ padding: 0.5 });

    const map = L.map('map', {
      center: [25, 10],
      zoom: 2.5,
      minZoom: 2,
      maxZoom: 12,
      zoomControl: true,
      scrollWheelZoom: 'center',
      attributionControl: true,
      worldCopyJump: true
    });

    L.tileLayer(TILE_URL, {
      attribution: TILE_ATTR,
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    const dotsGroup = L.layerGroup().addTo(map);
    const choroplethGroup = L.layerGroup();
    let heatLayer = null;

    // ── Load data & render dots ────────────────────────
    // Fetch API data and pre-computed coordinates in parallel
    Promise.all([
      fetch(DATA_URL).then(res => {
        if (!res.ok) throw new Error(`Failed to load university data: ${res.status}`);
        return res.json();
      }),
      fetch(COORDS_URL).then(res => {
        if (!res.ok) {
          console.warn('No pre-computed coords file found, using country centroids as fallback');
          return {};
        }
        return res.json();
      }).catch(() => {
        console.warn('Could not load coords file, using country centroids as fallback');
        return {};
      })
    ])
      .then(([universities, coords]) => {
        UNIVERSITY_COORDS = coords;
        universitiesData = universities;
        renderDots(universities);
        buildHeatLayer(universities);
        updateStats(universities);
        hideLoading();
      })
      .catch(err => {
        console.error('University data load error:', err);
        hideLoading();
      });

    function renderDots(universities) {
      universities.forEach((uni, i) => {
        const coords = resolveCoords(uni);
        if (!coords) return; // unknown country, skip

        const radius = dotRadius(uni.students);

        // Dimmer dots for 0-student universities
        const hasStudents = uni.students > 0;
        const fillOpacity = hasStudents ? 0.7 : 0.25;
        const borderOpacity = hasStudents ? 0.5 : 0.15;

        const marker = L.circleMarker(coords, {
          radius: radius,
          fillColor: '#00A1A1',
          fillOpacity: fillOpacity,
          color: '#81e3e3',
          weight: 1,
          opacity: borderOpacity,
          renderer: canvasRenderer
        }).addTo(dotsGroup);

        const tooltipContent = `
          <div class="uni-name">${uni.name}</div>
          <div class="uni-meta">${uni.country}</div>
        `;

        marker.bindTooltip(tooltipContent, {
          className: 'uni-tooltip',
          direction: 'top',
          offset: [0, -radius]
        });
      });
    }

    function buildHeatLayer(universities) {
      const maxStudents = Math.max(1, ...universities.map(u => u.students || 0));
      const points = universities
        .map(u => {
          const coords = resolveCoords(u);
          if (!coords) return null;
          const intensity = Math.log(1 + (u.students * 1000000000000 || 0)) / Math.log(1 + maxStudents);
          return [coords[0], coords[1], intensity];
        })
        .filter(Boolean);

      heatLayer = L.heatLayer(points, {
        radius: 35,
        blur: 25,
        maxZoom: 12,
        max: 1.0,
        gradient: { 0.0: '#0000ff', 0.3: '#00ffff', 0.5: '#00ff00', 0.7: '#ffff00', 1.0: '#ff0000' }
      });
    }

    function renderChoropleth(data) {
      choroplethGroup.clearLayers();
      geoJsonData = data;

      const countsByCode = {};
      universitiesData.forEach(u => {
        const code = u.alpha_two_code;
        countsByCode[code] = (countsByCode[code] || 0) + (u.students || 0);
      });

      const maxStudents = Math.max(1, ...Object.values(countsByCode));

      function choroColor(code) {
        const s = countsByCode[code] || 0;
        if (!s) return 'rgba(255,255,255,0.03)';
        const t = Math.log(s + 1) / Math.log(maxStudents + 1);
        return `rgba(0,161,161,${(0.12 + t * 0.75).toFixed(2)})`;
      }

      L.geoJSON(geoJsonData, {
        style: feature => ({
          fillColor: choroColor(feature.properties.ISO_A2),
          fillOpacity: 1,
          color: 'rgba(255,255,255,0.06)',
          weight: 0.5
        }),
        onEachFeature: (feature, layer) => {
          const code = feature.properties.ISO_A2;
          const count = countsByCode[code] || 0;
          if (count > 0) {
            layer.bindTooltip(
              `<div class="uni-name">${feature.properties.NAME}</div>` +
              `<div class="uni-meta">${count} student${count !== 1 ? 's' : ''}</div>`,
              { className: 'uni-tooltip', sticky: true }
            );
          }
        }
      }).addTo(choroplethGroup);
    }

    function loadAndRenderChoropleth() {
      const res = resolutionForZoom(map.getZoom());
      if (activeResolution === res) return;
      activeResolution = res;

      if (geoJsonCache[res]) {
        renderChoropleth(geoJsonCache[res]);
        return;
      }

      fetch(GEO_SOURCES[res])
        .then(r => { if (!r.ok) throw new Error('GeoJSON fetch failed'); return r.json(); })
        .then(data => {
          geoJsonCache[res] = data;
          if (activeResolution === res && currentMode === 'countries') {
            renderChoropleth(data);
          }
        })
        .catch(err => console.error('Could not load country borders:', err));
    }

    map.on('zoomend', () => {
      if (currentMode === 'countries') loadAndRenderChoropleth();
    });

    function setMode(mode) {
      if (mode === currentMode || !universitiesData) return;
      currentMode = mode;

      document.getElementById('btn-dots').classList.toggle('active', mode === 'dots');
      document.getElementById('btn-heatmap').classList.toggle('active', mode === 'heatmap');
      document.getElementById('btn-countries').classList.toggle('active', mode === 'countries');

      const dotsLegend     = document.getElementById('dots-legend');
      const countriesLegend = document.getElementById('countries-legend');
      const heatmapLegend  = document.getElementById('heatmap-legend');

      // Hide all layers first
      map.removeLayer(dotsGroup);
      if (map.hasLayer(choroplethGroup)) map.removeLayer(choroplethGroup);
      if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);

      dotsLegend.style.display     = 'none';
      countriesLegend.style.display = 'none';
      heatmapLegend.style.display  = 'none';

      if (mode === 'dots') {
        dotsGroup.addTo(map);
        dotsLegend.style.display = 'flex';
      } else if (mode === 'heatmap') {
        if (heatLayer) heatLayer.addTo(map);
        heatmapLegend.style.display = 'flex';
      } else {
        countriesLegend.style.display = 'flex';
        activeResolution = null;
        choroplethGroup.addTo(map);
        loadAndRenderChoropleth();
      }
    }

    function updateStats(universities) {
      const totalStudents = universities.reduce((sum, u) => sum + (u.students || 0), 0);
      const countries = new Set(universities.map(u => u.country)).size;

      document.getElementById('stat-unis').textContent = universities.length.toLocaleString();
      document.getElementById('stat-countries').textContent = countries;
     // document.getElementById('stat-students').textContent = totalStudents.toLocaleString();
    }

    function hideLoading() {
      const el = document.getElementById('loading');
      el.classList.add('hidden');
      setTimeout(() => el.remove(), 700);
    }
  </script>

</body>
</html>
